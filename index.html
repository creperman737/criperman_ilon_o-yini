<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;background:linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab);background-size:400% 400%;animation:rainbow 18s ease infinite;color:#fff;font-family:Arial,'Noto Color Emoji',sans-serif;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
@keyframes rainbow{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
canvas{background:rgba(0,0,0,.6);border:4px solid #fff;box-shadow:0 0 50px #fff;border-radius:12px;image-rendering:pixelated;width:95vw;max-width:500px;height:70vh;max-height:700px}
#hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:20px;background:rgba(0,255,51,.8);padding:10px 20px;border-radius:20px;font-weight:bold}
#overlay{position:fixed;inset:0;background:linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab);backdrop-filter:blur(10px);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:200}
.box{background:linear-gradient(145deg,#5d73ff,#002374);padding:40px;border-radius:20px;text-align:center;max-width:90vw;max-height:90vh;overflow-y:auto;border:2px solid #0f0;box-shadow:0 20px 50px rgba(0,255,170,.3)}
h2{margin-bottom:20px;color:#0f0}
button{padding:15px 30px;margin:10px;font-size:1.3rem;border:none;border-radius:15px;cursor:pointer;font-weight:bold;transition:.3s}
.primary{background:linear-gradient(45deg,#0f0,#0c0);color:#000}
.primary:hover{transform:scale(1.05);box-shadow:0 10px 20px rgba(0,255,170,.4)}
.shop-btn{background:#334;color:#fff}
.shop-btn:hover{background:#445}
.buy-btn{background:#fa0;color:#000}
.buy-btn:disabled{background:#444;cursor:not-allowed;opacity:.6}
.skin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
.skin-item{border:2px solid #444;border-radius:12px;padding:10px;cursor:pointer;transition:.2s}
.skin-item.active,.skin-item:hover{border-color:#0f0;box-shadow:0 0 15px #0f0}
.skin-img{width:80px;height:80px;object-fit:cover;border-radius:8px;display:block;margin:0 auto 8px}
#controls{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:150;display:none}
.dpad{display:flex;flex-direction:column;align-items:center;gap:10px}
.dpad-row{display:flex;gap:80px}
.ctrl-btn{width:80px;height:80px;font-size:2.5rem;background:rgba(0,255,170,.2);color:#fff;border:4px solid #0f0;border-radius:50%;cursor:pointer;transition:.2s}
.ctrl-btn:active{background:#0f0;color:#000;transform:scale(1.1)}
@media(max-width:600px){.dpad-row{gap:50px}.ctrl-btn{width:65px;height:65px;font-size:2rem}canvas{height:60vh}}

/* Noto Emoji — barcha emoji elementlari uchun */
.emoji{font-family:'Noto Color Emoji',serif;font-style:normal;}
button, .pu-badge, .ach-item, .ach-icon2, #achPopup{font-family:Arial,'Noto Color Emoji',sans-serif;}

/* Power-up HUD */
#powerupHud{position:fixed;top:65px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:10px;}
.pu-badge{background:rgba(0,0,0,.7);border:2px solid #fff;border-radius:12px;padding:6px 12px;font-size:1rem;font-weight:bold;display:flex;align-items:center;gap:6px;transition:all .3s;}
.pu-badge.active{animation:pulseBadge .6s ease infinite alternate;}
@keyframes pulseBadge{from{box-shadow:0 0 8px 2px currentColor;}to{box-shadow:0 0 20px 6px currentColor;}}
.pu-badge.shield{color:#00aaff;border-color:#00aaff;}
.pu-badge.freeze{color:#88eeff;border-color:#88eeff;}
.pu-badge.magnet{color:#ff88ff;border-color:#ff88ff;}
.pu-badge.coins2x{color:#ffd700;border-color:#ffd700;}

/* Floating label */
.pu-label{position:fixed;pointer-events:none;font-size:1.5rem;font-weight:bold;animation:floatUp 1.5s ease forwards;z-index:9999;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-80px);}}

/* Achievement popup */
#achPopup{
  position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(100px);
  z-index:9999;background:linear-gradient(135deg,#1a1a2e,#16213e);
  border:2px solid #ffd700;border-radius:16px;padding:14px 22px;
  display:flex;align-items:center;gap:14px;min-width:280px;max-width:90vw;
  box-shadow:0 8px 32px rgba(255,215,0,.3);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1), opacity .4s;
  opacity:0;pointer-events:none;
}
#achPopup.show{transform:translateX(-50%) translateY(0);opacity:1;}
#achPopup .ach-icon{font-size:2.2rem;flex-shrink:0;}
#achPopup .ach-text{text-align:left;}
#achPopup .ach-title{font-size:.8rem;color:#ffd700;text-transform:uppercase;letter-spacing:1px;}
#achPopup .ach-name{font-size:1.05rem;font-weight:bold;color:#fff;}
#achPopup .ach-reward{font-size:.9rem;color:#0f0;margin-top:2px;}

/* Gift tizimi */
.gift-box{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,140,0,.1));border:2px solid #ffd700;border-radius:16px;padding:18px;margin:10px 0;text-align:center;}
.gift-btn{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#000;border:none;border-radius:12px;padding:12px 24px;font-size:1.1rem;font-weight:bold;cursor:pointer;transition:.3s;width:100%;margin-top:8px;}
.gift-btn:hover{transform:scale(1.03);box-shadow:0 6px 20px rgba(255,200,0,.4);}
.gift-btn:disabled{background:#444;color:#888;cursor:not-allowed;transform:none;box-shadow:none;}
.gift-timer{color:#ffd700;font-size:.9rem;margin-top:6px;}
.big-gift-btn{background:linear-gradient(45deg,#a855f7,#6366f1);color:#fff;}
.big-gift-btn:hover{box-shadow:0 6px 20px rgba(168,85,247,.5);}
.big-gift-btn:disabled{background:#333;color:#666;}
@keyframes giftPop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.gift-result{animation:giftPop .4s ease forwards;font-size:2rem;margin:10px 0;}
/* Slot machine */
.slot-wrap{overflow:hidden;height:72px;border-radius:12px;background:#111;border:2px solid #444;margin:10px 0;}
.slot-reel{display:flex;flex-direction:column;transition:transform 0s;will-change:transform;}
.slot-item{height:72px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:bold;flex-shrink:0;gap:6px;}
.prize-row{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:8px;margin:3px 0;font-size:.88rem;}
.pct-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.15);margin-top:3px;overflow:hidden;}
.pct-fill{height:100%;border-radius:4px;}

/* Achievement list styles */
.ach-item{border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.ach-item.done{background:rgba(0,255,100,.08);border:1.5px solid #0f0;}
.ach-item.locked{background:rgba(255,255,255,.04);border:1.5px solid #444;}
.ach-item.earned{background:rgba(255,215,0,.08);border:1.5px solid #ffd700;animation:earnedPulse 2s ease infinite alternate;}
@keyframes earnedPulse{from{box-shadow:0 0 0 rgba(255,215,0,0);}to{box-shadow:0 0 12px rgba(255,215,0,.4);}}
.ach-item .ach-icon2{font-size:1.8rem;flex-shrink:0;}
.ach-item .ach-info{text-align:left;flex:1;}
.ach-item .ach-info b{font-size:.95rem;}
.ach-item .ach-info p{font-size:.8rem;opacity:.7;margin:2px 0;}
.ach-item .ach-info .reward{color:#ffd700;font-size:.85rem;}
.ach-progress{height:6px;background:#333;border-radius:3px;margin-top:6px;overflow:hidden;}
.ach-progress-bar{height:100%;background:linear-gradient(90deg,#0f0,#0c0);border-radius:3px;transition:width .3s;}
</style>
</head>

(function cleanStaleAchIds() {
  const validIds = new Set(ACHIEVEMENTS.map(a=>a.id));
  claimedAch = claimedAch.filter(id=>validIds.has(id));
  earnedAch  = earnedAch.filter(id=>validIds.has(id));
  localStorage.setItem('snakeClaimedAch', JSON.stringify(claimedAch));
  localStorage.setItem('snakeEarnedAch',  JSON.stringify(earnedAch));
})();


function checkAchievements(currentScore) {
  ACHIEVEMENTS.forEach(a => {
    if (earnedAch.includes(a.id)) return;
    let earned = false;
    if (a.type === 'stat')    earned = (stats[a.key] || 0) >= a.need;
    if (a.type === 'rank')    earned = highScore >= a.need;
    if (a.type === 'time')    earned = totalPlayMs >= a.need;
    if (a.type === 'special') return; // manual
    if (earned) earnAchievement(a.id);
  });
  // Special tekshiruv
  checkSpecialAchievements(currentScore);
}

function checkSpecialAchievements(currentScore) {
  // Risk yutuqlari
  if (stats.sessionGolden>=1 && stats.sessionPoison>=1) grantSpecial('risk1');
  if (stats.sessionGolden>=1 && stats.sessionPoison>=1) grantSpecial('risk2');
  if (stats.sessionPoison>=10) grantSpecial('risk3');
  if (stats.sessionGolden>=5) grantSpecial('risk4');
  if (stats.sessionApples>=30) grantSpecial('risk5');
  if (stats.sessionGolden>=5) grantSpecial('risk6');
  if (stats.sessionPoison>=5) grantSpecial('risk7');
  if (stats.sessionNormal>=20) grantSpecial('risk8');
  if (stats.goldenApples>=10 && stats.poisonApples>=10) grantSpecial('risk9');
  if ((stats.normalApples||0)+(stats.goldenApples||0)+(stats.poisonApples||0)>=100) grantSpecial('risk10');
  // Skill
  if (currentScore>=15) grantSpecial('sk2_8');
  if (currentScore>=25) grantSpecial('sk2_9');
  if (currentScore>=50) grantSpecial('sk2_10');
  // Skin
  const maxP = ownedSkins.length>1 ? Math.max(...ownedSkins.filter(i=>i>0).map(i=>headSkins.find(s=>s.id===i)?.price||0)) : 0;
  if (maxP>=50000)  grantSpecial('skR');
  if (maxP>=100000) grantSpecial('skE');
  if (maxP>=200000) grantSpecial('skLL');
  if (ownedSkins.length>=28) grantSpecial('skAll');
  // Power Emperor: barcha Lv4
  if(puLevels.shield>=4&&puLevels.freeze>=4&&puLevels.magnet>=4&&puLevels.coins2x>=4) grantSpecial('top9');
  // Criperman mode: 50 yutuq
  if(claimedAch.filter(id=>ACHIEVEMENTS.some(a=>a.id===id)).length>=50) grantSpecial('top10');
}

function grantSpecial(id) {
  if (earnedAch.includes(id)) return;
  earnAchievement(id);
}

function earnAchievement(id) {
  if (earnedAch.includes(id)) return;
  earnedAch.push(id);
  localStorage.setItem('snakeEarnedAch', JSON.stringify(earnedAch));
  // Popup ko'rsat
  const a = ACHIEVEMENTS.find(x=>x.id===id);
  if (a) { achQueue.push(a); if (!achShowing) showNextAch(); }
  if (document.getElementById('achListContainer')) showAchievements();
}

// Tugma bosilganda — coin beriladi
function claimAchievement(id) {
  if (claimedAch.includes(id)) return;
  if (!earnedAch.includes(id)) return;
  const a = ACHIEVEMENTS.find(x => x.id === id);
  if (!a) return;
  claimedAch.push(id);
  coins += a.reward;
  saveData();
  updateCoinsDisplay();
  // Popup
  achQueue.push(a);
  if (!achShowing) showNextAch();
  // Sahifani yangilash
  showAchievements();
}

// Maxsus yutuqlar (first_game, shop_buy) — earn + claim birdan
function grantAchievement(id) {
  earnAchievement(id);
  claimAchievement(id);
}

function showNextAch() {
  if (!achQueue.length) { achShowing = false; return; }
  achShowing = true;
  const a = achQueue.shift();
  const pop = document.getElementById('achPopup');
  document.getElementById('achPopIcon').textContent   = a.icon;
  document.getElementById('achPopName').textContent   = a.name;
  document.getElementById('achPopReward').textContent = a.pendingClaim
    ? '+' + a.reward + ' 🪙 — Yutuqlardan oling!'
    : '+' + a.reward + ' 🪙 olindi!';
  pop.classList.add('show');
  setTimeout(() => {
    pop.classList.remove('show');
    setTimeout(showNextAch, 400);
  }, 3500);
}

function weightedRandom(prizes) {
  const total = prizes.reduce((s,p)=>s+p.chance, 0);
  let r = Math.random()*total;
  for (const p of prizes) { r -= p.chance; if (r<=0) return p; }
  return prizes[prizes.length-1];
}

function canClaimDayGift()  { return Date.now()-lastDayGift  >= 24*60*60*1000; }
function canClaimBigGift()  { return Date.now()-lastBigGift  >= 0*0*0*1; }
function formatTimeLeft(lastMs) {
  const left = 24*60*60*1000-(Date.now()-lastMs);
  if (left<=0) return null;
  const h=Math.floor(left/3600000), m=Math.floor((left%3600000)/60000), s=Math.floor((left%60000)/1000);
  return h>0 ? h+'s '+m+'d' : m>0 ? m+' daqiqa' : s+' soniya';
}

// ─── Slot animatsiyasi
let slotRunning = false;

function runSlot(prizes, onDone) {
  if (slotRunning) return;
  slotRunning = true;
  const reel = document.getElementById('slotReel');
  if (!reel) { slotRunning=false; onDone(weightedRandom(prizes)); return; }

  const prize = weightedRandom(prizes);
  // Reel ichiga ko'p item yasaymiz
  const pool = [];
  for (let i=0; i<40; i++) pool.push(prizes[Math.floor(Math.random()*prizes.length)]);
  pool.push(prize); // oxirgi = haqiqiy natija
  const ITEM_H = 72;
  const totalItems = pool.length;

  // HTML yasash
  reel.innerHTML = pool.map(p=>
    `<div class="slot-item" style="color:${p.color};">${p.emoji} <span>${p.label}</span></div>`
  ).join('');
  reel.style.transition='none';
  reel.style.transform='translateY(0)';

  // Animatsiya: tez aylanib, oxirgi item da to'xtaydi
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const stopAt = -(totalItems-1)*ITEM_H;
      reel.style.transition='transform 3s cubic-bezier(0.17,0.67,0.12,0.99)';
      reel.style.transform=`translateY(${stopAt}px)`;
    });
  });

  setTimeout(()=>{
    slotRunning=false;
    onDone(prize);
  }, 3200);
}

  if (!canClaimDayGift() || slotRunning) return;
  const btn = document.getElementById('dayGiftBtn');

  runSlot(DAY_PRIZES, (prize)=>{
    coins += prize.coins;
    lastDayGift = Date.now();

}

function showAchievements(filterCat) {
  const validIds = new Set(ACHIEVEMENTS.map(a=>a.id));
  const validClaimed = claimedAch.filter(id=>validIds.has(id)).length;
  const pending = earnedAch.filter(id=>!claimedAch.includes(id) && validIds.has(id)).length;
  const cats = [...new Set(ACHIEVEMENTS.map(a=>a.cat))];

  let html = `<h2>🏆 Yutuqlar</h2>
    <p style="color:#ffd700;font-weight:bold;margin-bottom:6px;">${validClaimed}/${ACHIEVEMENTS.length} olindi${pending>0?` • <span style='color:#0f0;'>${pending} 🎁 tayyor!</span>`:''}</p>
    <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;">
      <button onclick="showAchievements()" style="padding:5px 10px;font-size:.78rem;background:${!filterCat?'#0f0':'#334'};color:${!filterCat?'#000':'#fff'};border:none;border-radius:8px;cursor:pointer;">Hammasi</button>
      <button onclick="showAchievements('tayyor')" style="padding:5px 10px;font-size:.78rem;background:${'tayyor'===filterCat?'#ffd700':'#334'};color:${'tayyor'===filterCat?'#000':'#fff'};border:none;border-radius:8px;cursor:pointer;">🎁 Tayyor</button>
      ${cats.map(c=>{
        const btnCat = c;
        const active = btnCat === filterCat;
        return `<button onclick="showAchievements('${btnCat.replace(/'/g,"\'")}')" style="padding:5px 8px;font-size:.75rem;background:${active?'#5d73ff':'#334'};color:#fff;border:none;border-radius:8px;cursor:pointer;">${btnCat}</button>`;
      }).join('')}
    </div>`;

  let list = [...ACHIEVEMENTS];
  if (filterCat==='tayyor') {
    list = list.filter(a=>earnedAch.includes(a.id)&&!claimedAch.includes(a.id));
  } else if (filterCat) {
    list = list.filter(a=>a.cat===filterCat);
  }
  // Tayyor bo'lganlar (unclaimed) birinchi
  list.sort((a,b)=>{
    const ae=earnedAch.includes(a.id)&&!claimedAch.includes(a.id);
    const be=earnedAch.includes(b.id)&&!claimedAch.includes(b.id);
    if(ae&&!be)return -1; if(!ae&&be)return 1; return 0;
  });

  let lastCat='';
  list.forEach(a=>{
    const claimed=claimedAch.includes(a.id);
    const earned=earnedAch.includes(a.id);
    const canClaim=earned&&!claimed;

    // Category header
    if (!filterCat||filterCat==='tayyor') {
      if (a.cat!==lastCat) {
        html+=`<div style="color:#aaa;font-size:.8rem;font-weight:bold;text-align:left;margin:12px 0 5px;padding-left:6px;border-left:3px solid #aaa;">${a.cat}</div>`;
        lastCat=a.cat;
      }
    }

    // Progress bar
    let progress='';
    if (!earned) {
      let pct=0, label='';
      if (a.type==='stat') {
        const cur=Math.min(stats[a.key]||0,a.need); pct=Math.floor(cur/a.need*100); label=`${cur}/${a.need}`;
      } else if (a.type==='rank') {
        const cur=Math.min(highScore,a.need); pct=Math.floor(cur/a.need*100); label=`${cur}/${a.need} ball`;
      } else if (a.type==='time') {
        const cur=Math.min(totalPlayMs,a.need); pct=Math.floor(cur/a.need*100); label=`${Math.floor(cur/60000)}/${Math.floor(a.need/60000)} daqiqa`;
      }
      if (pct>0||label) {
        progress=`<div class="ach-progress"><div class="ach-progress-bar" style="width:${pct}%"></div></div>
                  <p style="font-size:.72rem;opacity:.55;margin-top:2px;">${label}</p>`;
      }
    }

    html+=`<div class="ach-item ${claimed?'done':canClaim?'earned':'locked'}">
      <div class="ach-icon2" style="${earned||claimed?'':'filter:grayscale(1);opacity:.3'}">${a.icon}</div>
      <div class="ach-info" style="flex:1;">
        <b style="color:${claimed?'#0f0':canClaim?'#ffd700':'#777'}">${earned||claimed?a.name:'???'}</b>
        <p>${a.desc}</p>
        <p class="reward">+${a.reward} 🪙${claimed?' ✅':''}</p>
        ${!earned?progress:''}
      </div>
      <div style="flex-shrink:0;margin-left:6px;">
        ${canClaim
          ?`<button onclick="showAchievements('${(filterCat||'').replace(/'/g,"\'")}')" style="display:none"></button>
            <button onclick="claimAndRefresh('${a.id}','${(filterCat||'').replace(/'/g,"\'")}')"
              style="background:linear-gradient(45deg,#ffd700,#ff8c00);color:#000;border:none;border-radius:10px;
                     padding:8px 11px;font-size:.85rem;font-weight:bold;cursor:pointer;">🎁 Olish</button>`
          :claimed
            ?'<span style="color:#0f0;font-size:1.2rem;">✅</span>'
            :'<span style="color:#444;font-size:1.1rem;">🔒</span>'}
      </div>
    </div>`;
  });

  if (!list.length) html+='<p style="opacity:.5;margin:20px 0;">Bu kategoriyada hech narsa yo\'q</p>';

  // Stats qisqacha
  html+=`<div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;margin-top:12px;font-size:.8rem;opacity:.8;text-align:left;">
    📊 Normal: ${stats.normalApples||0} • Golden: ${stats.goldenApples||0} • Zahar: ${stats.poisonApples||0} •
    PU: ${stats.totalPowerups||0} • O'yin: ${stats.totalGames||0}
  </div>`;

  html+=`<button onclick="showStartScreen()" class="shop-btn" style="margin-top:14px;width:100%;">⬅ Orqaga</button>`;
  document.getElementById('overlayContent').innerHTML=html;
}

function claimAndRefresh(id, cat) {
  claimAchievement(id);
  showAchievements(cat||undefined);
}

function showSettings() {
  document.getElementById('overlayContent').innerHTML = `
    <h2>⚙️ Sozlamalar</h2>
    <div style="text-align:left;margin:20px 0;">
      <p><strong>Tezlik:</strong></p>
      <button onclick="setSpeed(280)" class="shop-btn" style="width:30%;">Sekin</button>
      <button onclick="setSpeed(200)" class="shop-btn" style="width:30%;">Normal</button>
      <button onclick="setSpeed(120)" class="shop-btn" style="width:30%;">Tez</button>
    </div>
    <button onclick="fullResetGame()" style="background:#ff4444;color:#fff;width:100%;margin:15px 0;padding:14px;border-radius:12px;border:none;font-size:1.1rem;font-weight:bold;cursor:pointer;">
      🔄 To'liq 0dan boshlash
    </button>
    <button onclick="showStartScreen()" class="shop-btn">Orqaga</button>
  `;
}

let gameSpeed = 200;
function setSpeed(ms) {
  gameSpeed = ms;
  if (gameRunning) { clearInterval(gameTimer); gameTimer = setInterval(update, gameSpeed); }
  alert('Tezlik: ' + ms + 'ms');
}

function fullResetGame() {
  if (!confirm('HAMMASI 0 DAN BOSHLANSINMI?\nCoin, rekord, skinlar, yutuqlar o\'chadi!')) return;
  coins=0; highScore=0; ownedSkins=[0]; selectedSkin=0;
  tailColor='#00cc77'; puLevels={shield:1,freeze:1,magnet:1,coins2x:1};
  claimedAch=[]; earnedAch=[]; totalPlayMs=0;
  stats={...DEFAULT_STATS};
  lastDayGift=0; lastBigGift=0;
  localStorage.setItem('snakeLastDayGift','0');
  localStorage.setItem('snakeLastBigGift','0');
  localStorage.clear();
  saveData();
  updateCoinsDisplay();
  ['score','coins','high'].forEach(id => document.getElementById(id).textContent='0');
  showStartScreen();
}

// ─────────────────────── Shop
function showShop(tab) {
  tab = tab || 'skins';
  const colors = {SHIELD:'#00aaff',FREEZE:'#88eeff',MAGNET:'#ff88ff',COINS2X:'#ffd700'};
  let html = `
    <h2>🛒 Shop</h2>
    <p>Coins: <b>${coins}</b> 🪙</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;">
      <button onclick="showShop('skins')"    class="${tab==='skins'?'primary':'shop-btn'}"    style="padding:9px 14px;font-size:.9rem;">🎭 Skinlar</button>
      <button onclick="showShop('tails')"    class="${tab==='tails'?'primary':'shop-btn'}"    style="padding:9px 14px;font-size:.9rem;">🎨 Dumlar</button>
      <button onclick="showShop('upgrades')" class="${tab==='upgrades'?'primary':'shop-btn'}" style="padding:9px 14px;font-size:.9rem;">⚡ Upgrades</button>
    </div>
  `;

  if (tab === 'skins') {
    html += '<div class="skin-grid">';
    headSkins.forEach(skin => {
      const owned = ownedSkins.includes(skin.id), isSel = selectedSkin===skin.id;
      html += `<div class="skin-item ${isSel?'active':''}" onclick="selectSkin(${skin.id})">
        <img class="skin-img" src="${skin.src}" alt="${skin.name}">
        <p>${skin.name}</p>
        ${owned
          ? (isSel ? '<small>✅ Tanlangan</small>' : `<button class="primary" style="padding:5px 10px;font-size:.8rem;" onclick="event.stopPropagation();selectSkin(${skin.id})">Tanlash</button>`)
          : `<button class="buy-btn${coins<skin.price?' disabled':''}" style="padding:5px 10px;font-size:.8rem;" onclick="event.stopPropagation();buySkin(${skin.id})" ${coins<skin.price?'disabled':''}>${skin.price}🪙</button>`}
      </div>`;
    });
    html += '</div>';

  } else if (tab === 'tails') {
    html += '<div class="skin-grid">';
    tailColors.forEach(tc => {
      const owned = ownedTails.includes(tc.color)||tc.price===0, isSel = tailColor===tc.color;
      html += `<div class="skin-item ${isSel?'active':''}" onclick="selectTail('${tc.color}')">
        <div style="width:70px;height:70px;background:${tc.color};border-radius:8px;margin:0 auto 8px;border:2px solid #fff;"></div>
        <p>${tc.name}</p>
        ${owned
          ? (isSel ? '<small>✅ Tanlangan</small>' : `<button class="primary" style="padding:5px 10px;font-size:.8rem;" onclick="event.stopPropagation();selectTail('${tc.color}')">Tanlash</button>`)
          : `<button class="buy-btn${coins<tc.price?' disabled':''}" style="padding:5px 10px;font-size:.8rem;" onclick="event.stopPropagation();buyTail('${tc.color}',${tc.price})" ${coins<tc.price?'disabled':''}>${tc.price}🪙</button>`}
      </div>`;
    });
    html += '</div>';

  } else if (tab === 'upgrades') {
    html += `<p style="opacity:.8;margin-bottom:14px;font-size:.9rem;">Power-uplarni upgrade qiling! 💪</p>
    <div style="display:flex;flex-direction:column;gap:14px;">`;
    Object.keys(PU_UPGRADES).forEach(type => {
      const upg = PU_UPGRADES[type];
      const lv = puLevels[upg.key]||1, cur = upg.levels[lv-1];
      const isMax = lv>=4, col = colors[type];
      const stars = '⭐'.repeat(lv)+'☆'.repeat(4-lv);
      const nextCost = isMax ? null : upg.levels[lv].upgradeCost;
      const canAfford = !isMax && coins>=nextCost;
      html += `<div style="border:2px solid ${col};border-radius:14px;padding:14px;background:rgba(0,0,0,.35);">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
          <div><span style="font-size:1.4rem;">${upg.emoji}</span>
            <b style="color:${col};margin-left:6px;">${upg.name}</b>
            <span style="margin-left:8px;">${stars}</span></div>
          <span style="font-size:.8rem;opacity:.7;background:rgba(255,255,255,.1);padding:3px 8px;border-radius:8px;">Lv ${lv}/4</span>
        </div>
        <p style="margin:7px 0 4px;font-size:.88rem;color:#bbb;">Hozir: <b style="color:#fff;">${cur.desc}</b></p>
        ${isMax
          ? `<div style="background:rgba(0,255,0,.1);border-radius:8px;padding:8px;text-align:center;color:#0f0;font-weight:bold;">✨ MAX!</div>`
          : `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:8px;">
              <span style="font-size:.82rem;opacity:.75;">${cur.upgradeDesc}</span>
              <button class="buy-btn${canAfford?'':' disabled'}" style="padding:7px 13px;font-size:.88rem;"
                onclick="upgradePowerup('${type}')" ${canAfford?'':'disabled'}>${nextCost}🪙 ⬆️</button>
            </div>`}
      </div>`;
    });
    html += '</div>';
  }

  html += `<button onclick="showStartScreen()" class="shop-btn" style="margin-top:18px;width:100%;">⬅ Orqaga</button>`;
  document.getElementById('overlayContent').innerHTML = html;
}

function upgradePowerup(type) {
  const upg = PU_UPGRADES[type];
  const lv = puLevels[upg.key]||1;
  if (lv>=4) return;
  const cost = upg.levels[lv].upgradeCost;
  if (coins<cost) return;
  coins -= cost;
  puLevels[upg.key] = lv+1;
  saveData(); updateCoinsDisplay();
  checkAchievements(score);
  showShop('upgrades');
}

function buySkin(id) {
  const skin = headSkins.find(s=>s.id===id);
  if (!skin||coins<skin.price||ownedSkins.includes(id)) return;
  coins -= skin.price; ownedSkins.push(id);
  stats.totalSkins=ownedSkins.length;
  saveData(); updateCoinsDisplay();
  grantAchievement('shop_buy');
  checkSpecialAchievements(score);
  showShop('skins');
}
function selectSkin(id) {
  if (!ownedSkins.includes(id)) return;
  selectedSkin=id; saveData(); loadHeadSkin(); showShop('skins');
}
function buyTail(color,price) {
  if (coins<price) return;
  if (!ownedTails.includes(color)) ownedTails.push(color);
  coins-=price; tailColor=color;
  saveData(); updateCoinsDisplay();
  grantAchievement('shop_buy');
  showShop('tails');
}
function selectTail(color) {
  if (!ownedTails.includes(color)) return;
  tailColor=color;
  saveData();
  showShop('tails');
}

// ─────────────────────── O'yin logikasi
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let grid=35, cols, rows;
let snake=[], dx=1, dy=0, food={}, score=0;
let gameRunning=false, gameTimer;
let lastEatTime=0, quickReflexTimer={count:0,startTime:0};

function resize() {
  const maxSize = Math.min(window.innerWidth*.92, window.innerHeight*.68);
  const cells   = Math.floor(maxSize/grid);
  canvas.width  = canvas.height = cells*grid;
  cols = rows = cells;
}
window.addEventListener('resize', resize);
resize();

let drawInterval = null;

function initGame() {
  snake = [{x:Math.floor(cols/2), y:Math.floor(rows/2)}];
  dx=1; dy=0; score=0;
  document.getElementById('score').textContent = 0;
  placeFood(); loadHeadSkin();
  gameRunning = true;
  spawnedPowerup = null;
  activePowerups = {shield:false,freeze:false,magnet:false,coins2x:false};
  Object.values(powerupTimers).forEach(clearTimeout);
  powerupTimers = {};
  updatePuHud();
  startPuSpawnCycle();
  // Session statistika reset
  stats.sessionNormal=0; stats.sessionGolden=0; stats.sessionPoison=0;
  stats.sessionApples=0; stats.sessionStartTime=Date.now();
  stats.currentStreak=0;
  quickReflexTimer={count:0, startTime:0};
  lastEatTime=0;
  clearInterval(drawInterval);
  drawInterval = setInterval(()=>{ if(gameRunning) draw(); }, 50);
}

function placeFood() {
  do {
    food.x = Math.floor(Math.random()*cols);
    food.y = Math.floor(Math.random()*rows);
  } while (snake.some(s=>s.x===food.x&&s.y===food.y));
  food.type = randomFoodType();
}

// ─────────────────────── Power-up spawn (20 sekund ko'rinadi)
function startPuSpawnCycle() {
  clearTimeout(puSpawnTimer);
  const delay = 8000 + Math.random()*6000;
  puSpawnTimer = setTimeout(() => { if (gameRunning) spawnPowerup(); }, delay);
}

function spawnPowerup() {
  if (!gameRunning) return;
  const types = Object.keys(POWERUP_TYPES);
  const type  = types[Math.floor(Math.random()*types.length)];
  let pos;
  do {
    pos = {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)};
  } while (snake.some(s=>s.x===pos.x&&s.y===pos.y)||(food.x===pos.x&&food.y===pos.y));
  spawnedPowerup = {x:pos.x, y:pos.y, type};

  // ✅ 20 sekund ko'rinadi (7 dan 20 ga o'zgardi)
  setTimeout(() => {
    if (spawnedPowerup && spawnedPowerup.type===type) spawnedPowerup = null;
    if (gameRunning) startPuSpawnCycle();
  }, 20000);
}

function activatePowerup(type) {
  const info   = POWERUP_TYPES[type];
  const key    = type.toLowerCase();
  const lvData = getPuConfig(type);
  const dur    = lvData.duration;

  showFloatingLabel(info.emoji+' '+info.label+' Lv'+(puLevels[key]||1)+'!', info.color);
  stats.totalPowerups=(stats.totalPowerups||0)+1; saveData();
  activePowerups[key] = true;
  clearTimeout(powerupTimers[key]);

  if (type==='FREEZE') {
    const sm = lvData.slowMult||3;
    clearInterval(gameTimer);
    gameTimer = setInterval(update, gameSpeed*sm);
  }

  powerupTimers[key] = setTimeout(() => {
    activePowerups[key] = false;
    updatePuHud();
    if (type==='FREEZE'&&gameRunning) {
      clearInterval(gameTimer);
      gameTimer = setInterval(update, gameSpeed);
    }
  }, dur);
  updatePuHud();
}

function updatePuHud() {
  const hud = document.getElementById('powerupHud');
  let h='';
  if (activePowerups.shield)  h+=`<div class="pu-badge shield active">🛡️ Shield</div>`;
  if (activePowerups.freeze)  h+=`<div class="pu-badge freeze active">❄️ Freeze</div>`;
  if (activePowerups.magnet)  h+=`<div class="pu-badge magnet active">🧲 Magnet</div>`;
  if (activePowerups.coins2x) h+=`<div class="pu-badge coins2x active">💎 2x</div>`;
  hud.innerHTML = h;
}

function showFloatingLabel(text, color) {
  const div = document.createElement('div');
  div.className   = 'pu-label';
  div.textContent = text;
  div.style.color = color;
  div.style.left  = (window.innerWidth/2-80)+'px';
  div.style.top   = (window.innerHeight/2-100)+'px';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(), 1500);
}

function applyMagnet() {
  if (!activePowerups.magnet||!food) return;
  const head  = snake[0];
  const steps = getPuConfig('MAGNET').steps||1;
  for (let i=0;i<steps;i++) {
    let nx=food.x, ny=food.y;
    if (food.x<head.x) nx++; else if (food.x>head.x) nx--;
    if (food.y<head.y) ny++; else if (food.y>head.y) ny--;
    if (!snake.some(s=>s.x===nx&&s.y===ny)) { food.x=nx; food.y=ny; }
  }
}

// ─────────────────────── Chizish
function drawPowerup(pu) {
  const info = POWERUP_TYPES[pu.type];
  const cx=pu.x*grid+grid/2, cy=pu.y*grid+grid/2, r=grid/2-2;
  const grd = ctx.createRadialGradient(cx-r*.3,cy-r*.3,1,cx,cy,r);
  grd.addColorStop(0,'#fff');
  grd.addColorStop(.4,info.color);
  grd.addColorStop(1,'#000a');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=grd; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  ctx.font=`${grid*.55}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(info.emoji,cx,cy+1);
}

function draw() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  if (activePowerups.freeze) {
    ctx.fillStyle='rgba(100,220,255,0.08)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  ctx.fillStyle=tailColor;
  snake.slice(1).forEach(s=>ctx.fillRect(s.x*grid+2,s.y*grid+2,grid-4,grid-4));
  if (activePowerups.shield) {
    const h=snake[0];
    ctx.beginPath(); ctx.arc(h.x*grid+grid/2,h.y*grid+grid/2,grid*.7,0,Math.PI*2);
    ctx.strokeStyle='#00aaff'; ctx.lineWidth=3; ctx.stroke();
  }
  ctx.drawImage(headImg,snake[0].x*grid+1,snake[0].y*grid+1,grid-2,grid-2);
  // Golden olma — yaltiroq halqa effekti
  if (food.type === 1) {
    const pulse = 0.5 + 0.5*Math.sin(Date.now()/200);
    ctx.beginPath();
    ctx.arc(food.x*grid+grid/2, food.y*grid+grid/2, grid/2+3+pulse*4, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,215,0,${0.4+pulse*0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  // Shrink olma — yashil halqa
  if (food.type === 2) {
    const pulse2 = 0.5 + 0.5*Math.sin(Date.now()/300);
    ctx.beginPath();
    ctx.arc(food.x*grid+grid/2, food.y*grid+grid/2, grid/2+3+pulse2*3, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(68,255,170,${0.4+pulse2*0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  const ftype = food.type || 0;
  ctx.drawImage(appleImgs[ftype], food.x*grid+1, food.y*grid+1, grid-2, grid-2);
  if (spawnedPowerup) drawPowerup(spawnedPowerup);
}

// ─────────────────────── Update
function update() {
  if (!gameRunning) return;
  applyMagnet();
  const head = {x:snake[0].x+dx, y:snake[0].y+dy};
  const hitWall = head.x<0||head.x>=cols||head.y<0||head.y>=rows;
  const hitSelf = snake.some(s=>s.x===head.x&&s.y===head.y);

  if (hitWall||hitSelf) {
    if (activePowerups.shield) {
      if (hitWall) { head.x=(head.x+cols)%cols; head.y=(head.y+rows)%rows; }
      else { dx=-dx; dy=-dy; }
      showFloatingLabel('🛡️ Himoyalandi!','#00aaff');
      return;
    }
    gameOver(); return;
  }

  snake.unshift(head);

  if (head.x===food.x&&head.y===food.y) {
    score++;
    const ft = FOOD_TYPES[food.type||0];
    const coinsMult = activePowerups.coins2x ? (getPuConfig('COINS2X').mult||2) : 1;
    const earned = ft.coin * coinsMult;
    coins += earned;

    // Statistika yangilash
    const now = Date.now();
    if (ft.id===0) { stats.normalApples=(stats.normalApples||0)+1; stats.sessionNormal++; }
    else if (ft.id===1) { stats.goldenApples=(stats.goldenApples||0)+1; stats.sessionGolden++; }
    else if (ft.id===2) { stats.poisonApples=(stats.poisonApples||0)+1; stats.sessionPoison++; }
    stats.totalCoinsEarned=(stats.totalCoinsEarned||0)+earned;
    stats.sessionApples++;
    // Streak (score = streak bir o'yinda)
    const curStreak = score;
    if (curStreak > (stats.maxStreak||0)) stats.maxStreak = curStreak;
    // Fast eat: 1s ichida
    if (lastEatTime>0 && now-lastEatTime<=1000) stats.fastEats=(stats.fastEats||0)+1;
    lastEatTime=now;
    // Quick reflex: 5s ichida 3 olma
    if (!quickReflexTimer.startTime || now-quickReflexTimer.startTime>5000) {
      quickReflexTimer={count:1,startTime:now};
    } else {
      quickReflexTimer.count++;
      if (quickReflexTimer.count>=3) grantSpecial('sk2_7');
    }
    // Survival
    stats.survivalSecs = Math.floor((now - (stats.sessionStartTime||now))/1000);
    stats.totalSkins = ownedSkins.length;

    saveData(); updateCoinsDisplay();
    document.getElementById('score').textContent = score;

    // Floating label
    const lbl = activePowerups.coins2x ? '+'+earned+' 💎' : ft.label;
    showFloatingLabel(lbl, ft.color);

    // Shrink: dum qisqartirish
    if (ft.shrink > 0 && snake.length > ft.shrink + 1) {
      snake.splice(snake.length - ft.shrink, ft.shrink);
    }

    placeFood();
    checkAchievements(score);
  } else {
    snake.pop();
  }

  if (spawnedPowerup&&head.x===spawnedPowerup.x&&head.y===spawnedPowerup.y) {
    activatePowerup(spawnedPowerup.type);
    spawnedPowerup=null;
    startPuSpawnCycle();
  }
  draw();
}

// ─────────────────────── startGame / gameOver
const bgMusic = document.getElementById('bgMusic');

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('controls').style.display = 'block';
  initGame();
  clearInterval(gameTimer);
  gameTimer = setInterval(update, gameSpeed);
  draw();
  bgMusic.play().catch(()=>{});
  bgMusic.volume = 0.3;
  startPlayTimer();
  // Birinchi o'yin yutuqi
  stats.totalGames=(stats.totalGames||0)+1; saveData();
  grantAchievement('first_game');
  checkAchievements(0);
}

function gameOver() {
  gameRunning = false;
  clearInterval(gameTimer);
  clearInterval(drawInterval);
  clearTimeout(puSpawnTimer);
  stopPlayTimer();
  spawnedPowerup = null;
  activePowerups = {shield:false,freeze:false,magnet:false,coins2x:false};
  Object.values(powerupTimers).forEach(clearTimeout);
  updatePuHud();

  if (score>highScore) {
    highScore=score;
    saveData();
    document.getElementById('high').textContent = highScore;
  }
  // Yakuniy tekshiruv
  checkAchievements(score);

  document.getElementById('overlayContent').innerHTML = `
    <h2>💀 O'yin tugadi!</h2>
    <p style="font-size:1.1rem;line-height:1.9;">
      Ball: <b>${score}</b><br>
      Coins: <b>${coins}</b> 🪙<br>
      Rekord: <b>${highScore}</b>
    </p>
    <div style="margin-bottom:10px;color:#0f0;font-weight:bold;">meni saqla</div>
    <button onclick="startGame()" class="primary">🔄 Qayta o'ynash</button>
    
    <button onclick="showStartScreen()" class="shop-btn">🏠 Menu</button>
    <button onclick="showAchievements()" class="shop-btn">🏆 Yutuqlar</button>
  `;
  document.getElementById('overlay').style.display = 'flex';
}

// ─────────────────────── Boshqaruv
document.getElementById('up').onclick    = ()=>{ if(dy!==1)  {dx=0;dy=-1;} };
document.getElementById('down').onclick  = ()=>{ if(dy!==-1) {dx=0;dy=1;}  };
document.getElementById('left').onclick  = ()=>{ if(dx!==1)  {dx=-1;dy=0;} };
document.getElementById('right').onclick = ()=>{ if(dx!==-1) {dx=1;dy=0;}  };

window.addEventListener('keydown', e=>{
  if (!gameRunning) return;
  if (e.key==='ArrowUp'   ||e.key==='w'){if(dy!==1)  {dx=0;dy=-1;}}
  if (e.key==='ArrowDown' ||e.key==='s'){if(dy!==-1) {dx=0;dy=1;} }
  if (e.key==='ArrowLeft' ||e.key==='a'){if(dx!==1)  {dx=-1;dy=0;}}
  if (e.key==='ArrowRight'||e.key==='d'){if(dx!==-1) {dx=1;dy=0;} }
});

// ─────────────────────── Start
updateCoinsDisplay();
document.getElementById('high').textContent = highScore;
showStartScreen();
draw();
</script>
