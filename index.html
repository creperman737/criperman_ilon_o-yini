<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilon o'yini – Coin & Shop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{height:100vh;background:linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab);background-size:400% 400%;animation:rainbow 18s ease infinite;color:#fff;font-family:Arial,sans-serif;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
@keyframes rainbow{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
canvas{background:rgba(0,0,0,.6);border:4px solid #fff;box-shadow:0 0 50px #fff;border-radius:12px;image-rendering:pixelated;width:95vw;max-width:500px;height:70vh;max-height:700px}
#hud{position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:20px;background:rgba(0,255,51,.8);padding:10px 20px;border-radius:20px;font-weight:bold}
#overlay{position:fixed;inset:0;background:linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab);backdrop-filter:blur(10px);display:flex;align-items:flex-start;justify-content:center;padding-top:40px;z-index:200}
.box{background:linear-gradient(145deg,#5d73ff,#002374);padding:40px;border-radius:20px;text-align:center;max-width:90vw;max-height:90vh;overflow-y:auto;border:2px solid #0f0;box-shadow:0 20px 50px rgba(0,255,170,.3)}
h2{margin-bottom:20px;color:#0f0}
button{padding:15px 30px;margin:10px;font-size:1.3rem;border:none;border-radius:15px;cursor:pointer;font-weight:bold;transition:.3s}
.primary{background:linear-gradient(45deg,#0f0,#0c0);color:#000}
.primary:hover{transform:scale(1.05);box-shadow:0 10px 20px rgba(0,255,170,.4)}
.shop-btn{background:#334;color:#fff}
.shop-btn:hover{background:#445}
.buy-btn{background:#fa0;color:#000}
.buy-btn:disabled{background:#444;cursor:not-allowed;opacity:.6}
.skin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin:20px 0}
.skin-item{border:2px solid #444;border-radius:12px;padding:10px;cursor:pointer;transition:.2s}
.skin-item.active,.skin-item:hover{border-color:#0f0;box-shadow:0 0 15px #0f0}
.skin-img{width:80px;height:80px;object-fit:cover;border-radius:8px;display:block;margin:0 auto 8px}
#controls{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:150;display:none}
.dpad{display:flex;flex-direction:column;align-items:center;gap:10px}
.dpad-row{display:flex;gap:80px}
.ctrl-btn{width:80px;height:80px;font-size:2.5rem;background:rgba(0,255,170,.2);color:#fff;border:4px solid #0f0;border-radius:50%;cursor:pointer;transition:.2s}
.ctrl-btn:active{background:#0f0;color:#000;transform:scale(1.1)}
@media(max-width:600px){.dpad-row{gap:50px}.ctrl-btn{width:65px;height:65px;font-size:2rem}canvas{height:60vh}}

/* Power-up HUD */
#powerupHud{
  position:fixed;top:65px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;gap:10px;
}
.pu-badge{
  background:rgba(0,0,0,.7);border:2px solid #fff;border-radius:12px;
  padding:6px 12px;font-size:1rem;font-weight:bold;display:flex;align-items:center;gap:6px;
  transition:all .3s;
}
.pu-badge.active{animation:pulseBadge .6s ease infinite alternate;}
@keyframes pulseBadge{from{box-shadow:0 0 8px 2px currentColor;}to{box-shadow:0 0 20px 6px currentColor;}}
.pu-badge.shield{color:#00aaff;border-color:#00aaff;}
.pu-badge.freeze{color:#88eeff;border-color:#88eeff;}
.pu-badge.magnet{color:#ff88ff;border-color:#ff88ff;}
.pu-badge.coins2x{color:#ffd700;border-color:#ffd700;}

/* Power-up spawn floating label */
.pu-label{
  position:absolute;pointer-events:none;font-size:1.5rem;font-weight:bold;
  animation:floatUp 1.2s ease forwards;z-index:300;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
</style>
</head>
<body>
<audio id="bgMusic" loop>
  <source src="musiqa.mp3" type="audio/mpeg">
</audio>
<canvas id="canvas"></canvas>

<div id="hud">
  Ball: <b id="score">0</b> • Coins: <b id="coins">0</b> • Rekord: <b id="high">0</b>
</div>

<!-- Power-up holati -->
<div id="powerupHud"></div>

<div id="overlay"><div class="box" id="overlayContent"></div></div>

<div id="controls">
  <div class="dpad">
    <button class="ctrl-btn" id="up">▲</button>
    <div class="dpad-row">
      <button class="ctrl-btn" id="left">◀</button>
      <button class="ctrl-btn" id="down">▼</button>
      <button class="ctrl-btn" id="right">▶</button>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────── Ma'lumotlar
let coins = parseInt(localStorage.getItem('snakeCoins') || '0');
let highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
let ownedSkins = JSON.parse(localStorage.getItem('snakeOwnedSkins') || '[0]');
let selectedSkin = parseInt(localStorage.getItem('snakeSelectedSkin') || '0');
let tailColor = localStorage.getItem('snakeTailColor') || '#00cc77';
// Power-up upgrade darajalari: {shield:0, freeze:0, magnet:0, coins2x:0} = Level 0 (xarid qilinmagan)
// Level 1 = base, Level 2 = kuchli, Level 3 = MAX
let puLevels = JSON.parse(localStorage.getItem('snakePuLevels') || '{"shield":1,"freeze":1,"magnet":1,"coins2x":1}');

// Har bir power-up uchun upgrade konfiguratsiyasi
const PU_UPGRADES = {
  SHIELD:  {
    key:'shield', emoji:'🛡️', name:'Shield',
    levels:[
      {level:1, duration:5000,  desc:'5 soniya himoya',    upgradeCost:300,  upgradeDesc:'→ Lv2: 8s'},
      {level:2, duration:8000,  desc:'8 soniya himoya',    upgradeCost:800,  upgradeDesc:'→ Lv3: 12s (MAX)'},
      {level:3, duration:12000, desc:'12 soniya himoya ✨', upgradeCost:null, upgradeDesc:'MAX daraja!'},
    ]
  },
  FREEZE:  {
    key:'freeze', emoji:'❄️', name:'Freeze',
    levels:[
      {level:1, duration:5000,  slowMult:3, desc:'5s, 3x sekin',       upgradeCost:300,  upgradeDesc:'→ Lv2: 8s, 4x'},
      {level:2, duration:8000,  slowMult:4, desc:'8s, 4x sekin',       upgradeCost:800,  upgradeDesc:'→ Lv3: 12s, 5x (MAX)'},
      {level:3, duration:12000, slowMult:5, desc:'12s, 5x sekin ✨',   upgradeCost:null, upgradeDesc:'MAX daraja!'},
    ]
  },
  MAGNET:  {
    key:'magnet', emoji:'🧲', name:'Magnet',
    levels:[
      {level:1, duration:6000,  steps:1, desc:'6s, 1 qadam/turn',    upgradeCost:300,  upgradeDesc:'→ Lv2: 9s, 2 qadam'},
      {level:2, duration:9000,  steps:2, desc:'9s, 2 qadam/turn',    upgradeCost:800,  upgradeDesc:'→ Lv3: 13s, 3 qadam (MAX)'},
      {level:3, duration:13000, steps:3, desc:'13s, 3 qadam/turn ✨', upgradeCost:null, upgradeDesc:'MAX daraja!'},
    ]
  },
  COINS2X: {
    key:'coins2x', emoji:'💎', name:'Coin Boost',
    levels:[
      {level:1, duration:5000,  mult:2, desc:'5s, +2 coin/olma',    upgradeCost:300,  upgradeDesc:'→ Lv2: 8s, +3 coin'},
      {level:2, duration:8000,  mult:3, desc:'8s, +3 coin/olma',    upgradeCost:800,  upgradeDesc:'→ Lv3: 12s, +4 coin (MAX)'},
      {level:3, duration:12000, mult:4, desc:'12s, +4 coin/olma ✨', upgradeCost:null, upgradeDesc:'MAX daraja!'},
    ]
  },
};

const headSkins = [
    {id:0,name:"Steve",src:"rasmlar/bosh4.png",price:0},
    {id:1,name:"Enderman",src:"rasmlar/bosh1.png",price:500},
    {id:2,name:"Wither",src:"rasmlar/bosh2.jpg",price:10000},
    {id:3,name:"Creeper",src:"rasmlar/bosh3.jpg",price:15000},
    {id:4,name:"Skeleton",src:"rasmlar/bosh5.jpg",price:25000},
    {id:5,name:"Dragon",src:"rasmlar/bosh6.png",price:30000},
    {id:6,name:"Zerokhan",src:"rasmlar/bosh7.png",price:20000},
    {id:7,name:"Blaziron",src:"rasmlar/bosh8.png",price:50000},
    {id:8,name:"Dee Karl",src:"rasmlar/bosh9.png",price:40000},
    {id:9,name:"Herobrine",src:"rasmlar/bosh10.webp",price:60000},
    {id:10,name:"Pick Me",src:"rasmlar/bosh11.png",price:70000},
    {id:11,name:"Philza",src:"rasmlar/bosh12.png",price:80000},
    {id:12,name:"Thornyx",src:"rasmlar/bosh13.png",price:90000},
    {id:13,name:"Gravion",src:"rasmlar/bosh14.png",price:100000},
    {id:14,name:"Nexor",src:"rasmlar/bosh15.png",price:110000},
    {id:15,name:"Skelzar",src:"rasmlar/bosh16.png",price:120000},
    {id:16,name:"Pyronix",src:"rasmlar/bosh17.png",price:130000},
    {id:17,name:"Umbrix",src:"rasmlar/bosh18.png",price:140000},
    {id:18,name:"Cryzoth",src:"rasmlar/bosh19.png",price:150000},
    {id:19,name:"Voltaris",src:"rasmlar/bosh20.png",price:160000},
    {id:20,name:"Drakmor",src:"rasmlar/bosh21.png",price:170000},
    {id:21,name:"Lumex",src:"rasmlar/bosh22.png",price:180000},
    {id:22,name:"Shardok",src:"rasmlar/bosh23.png",price:190000},
    {id:23,name:"Flarion",src:"rasmlar/bosh24.png",price:200000},
    {id:24,name:"Zyphor",src:"rasmlar/bosh25.png",price:210000},
    {id:25,name:"Brakkon",src:"rasmlar/bosh26.png",price:220000},
    {id:26,name:"Nythera",src:"rasmlar/bosh27.png",price:230000},
    {id:27,name:"Orvex",src:"rasmlar/bosh28.png",price:240000}
];

const tailColors = [
  {name:"Yashil (default)",color:"#00cc77",price:0},
  {name:"Qizil",color:"#ff3366",price:100},
  {name:"Moviy",color:"#44aaff",price:200},
  {name:"Sariq",color:"#ffdd44",price:300},
  {name:"Binafsha",color:"#aa44ff",price:500},
  {name:"Oq",color:"#ffffff",price:1000},
  {name:"Jigarang",color:"#653700",price:2000},
  {name:"Pushti",color:"#ff69b4",price:400},
  {name:"To'q sariq",color:"#ff8c00",price:600},
  {name:"Neon ko'k",color:"#00ffff",price:800},
  {name:"Limon yashil",color:"#ccff00",price:900},
  {name:"Lavanda",color:"#c8a2c8",price:700},
  {name:"Metallik kumush",color:"#c0c0c0",price:1500},
  {name:"Qizil olov",color:"#ff4500",price:1200},
  {name:"Turkuaz",color:"#40e0d0",price:1100},
  {name:"Oltin",color:"#ffd700",price:2500}
];

let headImg = new Image();
let appleImg = new Image();
headImg.src = headSkins[selectedSkin].src;
appleImg.src = "rasmlar/ovqat.webp";

// ────────────────────────────────────────────── Power-up tizimi
// Har bir power-up turi
// POWERUP_TYPES — davomiylik puLevels ga qarab dinamik hisoblanadi
function getPuConfig(type) {
  const upg = PU_UPGRADES[type];
  const lv = puLevels[upg.key] || 1;
  return { ...upg.levels[lv-1], ...{emoji: upg.emoji, color: getPuColor(type), label: upg.name} };
}
function getPuColor(type) {
  return {SHIELD:'#00aaff',FREEZE:'#88eeff',MAGNET:'#ff88ff',COINS2X:'#ffd700'}[type];
}
const POWERUP_TYPES = {
  SHIELD:  { emoji:'🛡️', color:'#00aaff', label:'Shield'    },
  FREEZE:  { emoji:'❄️', color:'#88eeff', label:'Freeze'    },
  MAGNET:  { emoji:'🧲', color:'#ff88ff', label:'Magnet'    },
  COINS2X: { emoji:'💎', color:'#ffd700', label:'Coin Boost'},
};

// Aktiv power-up holatlari
let activePowerups = {
  shield: false,
  freeze: false,
  magnet: false,
  coins2x: false,
};
let powerupTimers = {};

// Maydondag power-up obyekti (faqat bitta bir vaqtda)
let spawnedPowerup = null; // {x, y, type}
let puSpawnTimer = null;

function startPuSpawnCycle() {
  clearTimeout(puSpawnTimer);
  // 8–14 sekund oraliqda random yangi power-up paydo bo'ladi
  const delay = 8000 + Math.random() * 6000;
  puSpawnTimer = setTimeout(() => {
    if (gameRunning) spawnPowerup();
  }, delay);
}

function spawnPowerup() {
  if (!gameRunning) return;
  const types = Object.keys(POWERUP_TYPES);
  const type = types[Math.floor(Math.random() * types.length)];
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * cols),
      y: Math.floor(Math.random() * rows)
    };
  } while (
    snake.some(s => s.x === pos.x && s.y === pos.y) ||
    (food.x === pos.x && food.y === pos.y)
  );
  spawnedPowerup = { x: pos.x, y: pos.y, type };
  // 7 sekund ko'rinadi, keyin yo'qoladi
  setTimeout(() => {
    if (spawnedPowerup && spawnedPowerup.type === type) spawnedPowerup = null;
    if (gameRunning) startPuSpawnCycle();
  }, 7000);
}

function activatePowerup(type) {
  const info = POWERUP_TYPES[type];
  const key = type.toLowerCase();
  // Level ma'lumotlarini olish
  const lvData = getPuConfig(type);
  const duration = lvData.duration;

  showFloatingLabel(info.emoji + ' ' + info.label + ' Lv' + (puLevels[key]||1) + '!', info.color);

  activePowerups[key] = true;
  clearTimeout(powerupTimers[key]);

  // Freeze: level bo'yicha sekinlashtirish
  if (type === 'FREEZE') {
    const slowMult = lvData.slowMult || 3;
    clearInterval(gameTimer);
    gameTimer = setInterval(update, gameSpeed * slowMult);
  }

  powerupTimers[key] = setTimeout(() => {
    activePowerups[key] = false;
    updatePuHud();
    if (type === 'FREEZE' && gameRunning) {
      clearInterval(gameTimer);
      gameTimer = setInterval(update, gameSpeed);
    }
  }, duration);
  updatePuHud();
}

function updatePuHud() {
  const hud = document.getElementById('powerupHud');
  let html = '';
  if (activePowerups.shield)  html += `<div class="pu-badge shield active">🛡️ Shield</div>`;
  if (activePowerups.freeze)  html += `<div class="pu-badge freeze active">❄️ Freeze</div>`;
  if (activePowerups.magnet)  html += `<div class="pu-badge magnet active">🧲 Magnet</div>`;
  if (activePowerups.coins2x) html += `<div class="pu-badge coins2x active">💎 2x</div>`;
  hud.innerHTML = html;
}

function showFloatingLabel(text, color) {
  const div = document.createElement('div');
  div.className = 'pu-label';
  div.textContent = text;
  div.style.color = color;
  div.style.left = (window.innerWidth/2 - 60) + 'px';
  div.style.top = (window.innerHeight/2 - 80) + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1300);
}

// Magnet: ovqatni bir qadam ilonga yaqinlashtiradi
function applyMagnet() {
  if (!activePowerups.magnet || !food) return;
  const head = snake[0];
  const steps = getPuConfig('MAGNET').steps || 1;
  for (let i = 0; i < steps; i++) {
    let nx = food.x, ny = food.y;
    if (food.x < head.x) nx++;
    else if (food.x > head.x) nx--;
    if (food.y < head.y) ny++;
    else if (food.y > head.y) ny--;
    if (!snake.some(s => s.x === nx && s.y === ny)) {
      food.x = nx; food.y = ny;
    }
  }
}

// ────────────────────────────────────────────── Funksiyalar
function saveData() {
    localStorage.setItem('snakeCoins', coins);
    localStorage.setItem('snakeHigh', highScore);
    localStorage.setItem('snakeOwnedSkins', JSON.stringify(ownedSkins));
    localStorage.setItem('snakeSelectedSkin', selectedSkin);
    localStorage.setItem('snakeTailColor', tailColor);
    localStorage.setItem('snakePuLevels', JSON.stringify(puLevels));
}

function updateCoinsDisplay() {
    document.getElementById('coins').textContent = coins;
    if (document.getElementById('shopCoins')) document.getElementById('shopCoins').textContent = coins;
}

function loadHeadSkin() {
    headImg.src = headSkins[selectedSkin].src;
}

function showStartScreen() {
    document.getElementById('overlayContent').innerHTML = `
        <h2>🐍 Ilon O'yini</h2>
        <p style="opacity:0.9; margin:20px 0 30px;">
            Har bir olmani ye → +1 coin to'pla!<br>
            Shopdan bosh va dum rangini o'zgartirish mumkin.<br><br>
            <b>Power-uplar:</b><br>
            🛡️ Shield – 5s davomida o'limdan saqlab qoladi<br>
            ❄️ Freeze – ilon 5s sekinlashadi<br>
            🧲 Magnet – ovqat 6s ilon tomon tortiladi<br>
            💎 2x Coin – 5s davomida ikki barobar coin
        </p>
        <button id="playBtn" class="primary">O'ynash</button>
        <button id="shopBtn" class="shop-btn">Shop (Coins: <span id="shopCoins">${coins}</span>)</button>
        <button id="settingsBtn" class="shop-btn" style="margin-top:15px;">⚙️ Sozlamalar</button>
    `;
    document.getElementById('playBtn').onclick = startGame;
    document.getElementById('shopBtn').onclick = showShop;
    document.getElementById('settingsBtn').onclick = showSettings;
    document.getElementById('overlay').style.display = 'flex';
}

function showSettings() {
    document.getElementById('overlayContent').innerHTML = `
        <h2>⚙️ Sozlamalar</h2>
        <div style="text-align:left; margin:20px 0;">
            <p><strong>Til:</strong></p>
            <button onclick="changeLanguage('uz')" class="shop-btn" style="width:45%;">🇺🇿 O'zbek</button>
            <button onclick="changeLanguage('en')" class="shop-btn" style="width:45%;">🇬🇧 English</button>
            <p style="margin-top:20px;"><strong>Tezlik:</strong></p>
            <button onclick="setSpeed(280)" class="shop-btn" style="width:30%;">Sekin</button>
            <button onclick="setSpeed(200)" class="shop-btn" style="width:30%;">Normal</button>
            <button onclick="setSpeed(120)" class="shop-btn" style="width:30%;">Tez</button>
        </div>
        <button onclick="fullResetGame()" class="primary" style="background:#ff4444; width:100%; margin:15px 0;">
            🔄 To'liq 0dan boshlash
        </button>
        <button onclick="showStartScreen()" class="shop-btn">Orqaga</button>
    `;
}

let currentLang = localStorage.getItem('snakeLang') || 'uz';
let gameSpeed = 400; // O'rtacha tezlik (ms)

function changeLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('snakeLang', lang);
    showStartScreen();
    alert(lang === 'uz' ? 'Til o\'zbek tiliga o\'zgartirildi!' : 'Language changed!');
}

function setSpeed(ms) {
    gameSpeed = ms;
    if (gameRunning) {
        clearInterval(gameTimer);
        gameTimer = setInterval(update, gameSpeed);
    }
    alert('Tezlik o\'zgartirildi: ' + ms + 'ms');
}

function fullResetGame() {
    if (confirm('HAQIQATDAN HAM HAMMASI 0 DAN BOSHLANSINMI?\n\nBarcha tangalar, rekord va skinlar o\'chib ketadi!')) {
        coins = 0;
        highScore = 0;
        ownedSkins = [0];
        selectedSkin = 0;
        tailColor = '#00cc77';
        puLevels = {shield:1,freeze:1,magnet:1,coins2x:1};
        saveData();
        updateCoinsDisplay();
        document.getElementById('score').textContent = '0';
        document.getElementById('coins').textContent = '0';
        document.getElementById('high').textContent = '0';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        showStartScreen();
        alert('Hammasi 0 dan yangilandi!\nMenyuga qaytdingiz.');
    }
}

function showShop(tab) {
    tab = tab || 'skins';
    const colors = {SHIELD:'#00aaff',FREEZE:'#88eeff',MAGNET:'#ff88ff',COINS2X:'#ffd700'};
    let html = `
      <h2>🛒 Shop</h2>
      <p>Coins: <b>${coins}</b></p>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;">
        <button onclick="showShop('skins')" class="${tab==='skins'?'primary':'shop-btn'}" style="padding:10px 16px;font-size:.95rem;">🎭 Skinlar</button>
        <button onclick="showShop('tails')" class="${tab==='tails'?'primary':'shop-btn'}" style="padding:10px 16px;font-size:.95rem;">🎨 Dumlar</button>
        <button onclick="showShop('upgrades')" class="${tab==='upgrades'?'primary':'shop-btn'}" style="padding:10px 16px;font-size:.95rem;">⚡ Upgrades</button>
      </div>
    `;

    if (tab === 'skins') {
        html += '<div class="skin-grid">';
        headSkins.forEach(skin => {
            const owned = ownedSkins.includes(skin.id);
            const isSel = selectedSkin === skin.id;
            html += `<div class="skin-item ${isSel?'active':''}" onclick="selectSkin(${skin.id})">
                <img class="skin-img" src="${skin.src}" alt="${skin.name}">
                <p>${skin.name}</p>
                ${owned
                  ? (isSel ? '<small>✅ Tanlangan</small>' : `<button class="primary" style="padding:6px 10px;font-size:.85rem;" onclick="event.stopPropagation();selectSkin(${skin.id})">Tanlash</button>`)
                  : `<button class="buy-btn${coins<skin.price?' disabled':''}" style="padding:6px 10px;font-size:.85rem;" onclick="event.stopPropagation();buySkin(${skin.id})" ${coins<skin.price?'disabled':''}>${skin.price}🪙</button>`}
            </div>`;
        });
        html += '</div>';

    } else if (tab === 'tails') {
        html += '<div class="skin-grid">';
        tailColors.forEach(tc => {
            const owned = tailColor===tc.color || tc.price===0;
            const isSel = tailColor===tc.color;
            html += `<div class="skin-item ${isSel?'active':''}" onclick="selectTail('${tc.color}')">
                <div style="width:70px;height:70px;background:${tc.color};border-radius:8px;margin:0 auto 8px;border:2px solid #fff;"></div>
                <p>${tc.name}</p>
                ${owned
                  ? (isSel ? '<small>✅ Tanlangan</small>' : `<button class="primary" style="padding:6px 10px;font-size:.85rem;" onclick="event.stopPropagation();selectTail('${tc.color}')">Tanlash</button>`)
                  : `<button class="buy-btn${coins<tc.price?' disabled':''}" style="padding:6px 10px;font-size:.85rem;" onclick="event.stopPropagation();buyTail('${tc.color}',${tc.price})" ${coins<tc.price?'disabled':''}>${tc.price}🪙</button>`}
            </div>`;
        });
        html += '</div>';

    } else if (tab === 'upgrades') {
        html += `<p style="opacity:.8;margin-bottom:15px;font-size:.9rem;">
          Power-uplar 3 darajagacha upgrade qilinadi.<br>
          Daraja oshgan sari davomiylik va kuch ortadi! 💪
        </p><div style="display:flex;flex-direction:column;gap:16px;">`;

        Object.keys(PU_UPGRADES).forEach(type => {
            const upg = PU_UPGRADES[type];
            const lv = puLevels[upg.key] || 1;
            const cur = upg.levels[lv-1];
            const isMax = lv >= 3;
            const col = colors[type];
            const stars = '⭐'.repeat(lv) + '☆'.repeat(3-lv);
            const nextCost = isMax ? null : upg.levels[lv].upgradeCost;
            const canAfford = !isMax && coins >= nextCost;

            html += `<div style="border:2px solid ${col};border-radius:14px;padding:14px;background:rgba(0,0,0,.35);">
              <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
                <div>
                  <span style="font-size:1.5rem;">${upg.emoji}</span>
                  <b style="font-size:1.05rem;color:${col};margin-left:6px;">${upg.name}</b>
                  <span style="margin-left:8px;">${stars}</span>
                </div>
                <span style="font-size:.8rem;opacity:.7;background:rgba(255,255,255,.1);padding:3px 8px;border-radius:8px;">Lv ${lv}/3</span>
              </div>
              <p style="margin:8px 0 4px;font-size:.9rem;color:#bbb;">
                Hozir: <b style="color:#fff;">${cur.desc}</b>
              </p>
              ${isMax
                ? `<div style="background:rgba(0,255,0,.1);border-radius:8px;padding:8px;text-align:center;color:#0f0;font-weight:bold;margin-top:6px;">✨ MAX daraja!</div>`
                : `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:8px;">
                    <span style="font-size:.82rem;opacity:.75;">${cur.upgradeDesc}</span>
                    <button
                      class="buy-btn${canAfford?'':' disabled'}"
                      style="padding:8px 14px;font-size:.9rem;"
                      onclick="upgradePowerup('${type}')"
                      ${canAfford?'':'disabled'}
                    >${nextCost}🪙 Upgrade ⬆️</button>
                  </div>`
              }
            </div>`;
        });
        html += '</div>';
    }

    html += '<button onclick="showStartScreen()" class="shop-btn" style="margin-top:20px;width:100%;">⬅ Orqaga</button>';
    document.getElementById('overlayContent').innerHTML = html;
}

function upgradePowerup(type) {
    const upg = PU_UPGRADES[type];
    const lv = puLevels[upg.key] || 1;
    if (lv >= 3) return;
    const cost = upg.levels[lv].upgradeCost;
    if (coins < cost) return;
    coins -= cost;
    puLevels[upg.key] = lv + 1;
    saveData();
    updateCoinsDisplay();
    showShop('upgrades');
}

function buySkin(id) {
    const skin = headSkins.find(s => s.id === id);
    if (!skin || coins < skin.price || ownedSkins.includes(id)) return;
    coins -= skin.price;
    ownedSkins.push(id);
    saveData();
    updateCoinsDisplay();
    showShop('skins');
}

function selectSkin(id) {
    if (ownedSkins.includes(id)) {
        selectedSkin = id;
        saveData();
        loadHeadSkin();
        showShop('skins');
    }
}

function buyTail(color, price) {
    if (coins < price) return;
    coins -= price;
    tailColor = color;
    saveData();
    updateCoinsDisplay();
    showShop('tails');
}

function selectTail(color) {
    tailColor = color;
    saveData();
    showShop('tails');
}

// ────────────────────────────────────────────── O'yin logikasi
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let grid = 35;
let cols, rows;
let snake = [];
let dx = 1, dy = 0;
let food = {};
let score = 0;
let gameRunning = false;
let gameTimer;

function resize() {
    const maxSize = Math.min(window.innerWidth*0.92, window.innerHeight*0.68);
    const cells = Math.floor(maxSize / grid);
    canvas.width = canvas.height = cells * grid;
    cols = rows = cells;
}
window.addEventListener('resize', resize);
resize();

function initGame() {
    snake = [{x:Math.floor(cols/2), y:Math.floor(rows/2)}];
    dx = 1; dy = 0;
    score = 0;
    document.getElementById('score').textContent = 0;
    placeFood();
    loadHeadSkin();
    gameRunning = true;

    // Power-uplarni reset
    spawnedPowerup = null;
    activePowerups = {shield:false, freeze:false, magnet:false, coins2x:false};
    Object.values(powerupTimers).forEach(clearTimeout);
    powerupTimers = {};
    updatePuHud();
    startPuSpawnCycle();
}

function placeFood() {
    do {
        food.x = Math.floor(Math.random() * cols);
        food.y = Math.floor(Math.random() * rows);
    } while (snake.some(s => s.x === food.x && s.y === food.y));
}

// Power-up chizish (yaltiroq doira + emoji)
function drawPowerup(pu) {
    const info = POWERUP_TYPES[pu.type];
    const cx = pu.x * grid + grid/2;
    const cy = pu.y * grid + grid/2;
    const r = grid/2 - 2;
    // Yaltiroq aylana
    const grd = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 1, cx, cy, r);
    grd.addColorStop(0, '#fff');
    grd.addColorStop(0.4, info.color);
    grd.addColorStop(1, '#000a');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Emoji
    ctx.font = `${grid*0.55}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.emoji, cx, cy+1);
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Freeze effekti: ko'k tuman
    if (activePowerups.freeze) {
        ctx.fillStyle = 'rgba(100,220,255,0.08)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // Dum
    ctx.fillStyle = tailColor;
    snake.slice(1).forEach(s => ctx.fillRect(s.x*grid+2, s.y*grid+2, grid-4, grid-4));

    // Shield effekti: bosh atrofida aylana
    if (activePowerups.shield) {
        const h = snake[0];
        ctx.beginPath();
        ctx.arc(h.x*grid+grid/2, h.y*grid+grid/2, grid*0.7, 0, Math.PI*2);
        ctx.strokeStyle = '#00aaff';
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    // Bosh
    ctx.drawImage(headImg, snake[0].x*grid+1, snake[0].y*grid+1, grid-2, grid-2);

    // Ovqat
    ctx.drawImage(appleImg, food.x*grid+1, food.y*grid+1, grid-2, grid-2);

    // Power-up (maydondag)
    if (spawnedPowerup) drawPowerup(spawnedPowerup);
}

function update() {
    if (!gameRunning) return;

    applyMagnet();

    const head = {x:snake[0].x + dx, y:snake[0].y + dy};

    // To'qnashuv tekshiruvi
    const hitWall = head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows;
    const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);

    if (hitWall || hitSelf) {
        if (activePowerups.shield) {
            // Shield aktiv → o'lmaydi
            // Devorga tegsa: qarama-qarshi tarafdan chiqadi (wrap)
            if (hitWall) {
                head.x = (head.x + cols) % cols;
                head.y = (head.y + rows) % rows;
            } else {
                // O'z dumiga tegsa: yo'nalishni teskariga o'zgartir
                dx = -dx; dy = -dy;
            }
            showFloatingLabel('🛡️ Himoyalandi!', '#00aaff');
            return;
        }
        gameOver();
        return;
    }

    snake.unshift(head);

    // Ovqat yedimi?
    if (head.x === food.x && head.y === food.y) {
        score++;
        const coins2xMult = activePowerups.coins2x ? (getPuConfig('COINS2X').mult || 2) : 1;
        const earned = coins2xMult;
        coins += earned;
        saveData();
        updateCoinsDisplay();
        document.getElementById('score').textContent = score;
        if (activePowerups.coins2x) showFloatingLabel('+2 💎', '#ffd700');
        placeFood();
    } else {
        snake.pop();
    }

    // Power-up yedimi?
    if (spawnedPowerup && head.x === spawnedPowerup.x && head.y === spawnedPowerup.y) {
        activatePowerup(spawnedPowerup.type);
        spawnedPowerup = null;
        startPuSpawnCycle();
    }

    draw();
}

// Fon musiqasi
const bgMusic = document.getElementById('bgMusic');

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('controls').style.display = 'block';
    initGame();
    clearInterval(gameTimer);
    gameTimer = setInterval(update, gameSpeed);
    draw();
    bgMusic.play().catch(e => console.log("Musiqa avto-play bloklandi:", e));
    bgMusic.volume = 0.3;
}

function gameOver() {
    gameRunning = false;
    clearInterval(gameTimer);
    clearTimeout(puSpawnTimer);
    spawnedPowerup = null;
    activePowerups = {shield:false, freeze:false, magnet:false, coins2x:false};
    Object.values(powerupTimers).forEach(clearTimeout);
    updatePuHud();

    if (score > highScore) {
        highScore = score;
        saveData();
        document.getElementById('high').textContent = highScore;
    }
    document.getElementById('overlayContent').innerHTML = `
        <h2>Yutqazdingiz!</h2>
        <p>Ball: <b>${score}</b><br>
           Coins: <b>${coins}</b><br>
           Rekord: <b>${highScore}</b></p>
        <button onclick="startGame()" class="primary">Qayta o'ynash</button>
        <button onclick="showStartScreen()" class="shop-btn">Menu</button>
    `;
    document.getElementById('overlay').style.display = 'flex';
}

// Boshqaruv
document.getElementById('up').onclick    = () => { if(dy!==1)  {dx=0; dy=-1;} };
document.getElementById('down').onclick  = () => { if(dy!==-1) {dx=0; dy=1;}  };
document.getElementById('left').onclick  = () => { if(dx!==1)  {dx=-1;dy=0;}  };
document.getElementById('right').onclick = () => { if(dx!==-1) {dx=1; dy=0;}  };

window.addEventListener('keydown', e => {
    if (!gameRunning) return;
    if (e.key==='ArrowUp'   ||e.key==='w'){if(dy!==1)  {dx=0; dy=-1;}}
    if (e.key==='ArrowDown' ||e.key==='s'){if(dy!==-1) {dx=0; dy=1;} }
    if (e.key==='ArrowLeft' ||e.key==='a'){if(dx!==1)  {dx=-1;dy=0;} }
    if (e.key==='ArrowRight'||e.key==='d'){if(dx!==-1) {dx=1; dy=0;} }
});

// Start
updateCoinsDisplay();
document.getElementById('high').textContent = highScore;
showStartScreen();
draw();
</script>
